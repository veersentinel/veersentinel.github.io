<!DOCTYPE html>
<html lang="en">

<head>
    <!-- CORE META -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b0f14">
    <meta name="robots" content="index, follow">

    <!-- SEO -->
    <title>Veer Sentinel</title>
    <meta name="description" content="Veer Sentinel modern dynamic web application">
    <link rel="canonical" href="https://yourdomain.com/">

    <!-- FAVICON -->
    <link rel="icon" href="/favicon.ico" sizes="any">

    <!-- PERFORMANCE -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

    <!-- STYLES -->
    <link rel="stylesheet" href="src/css/style.css">
</head>

<body class="ui-root">

    <!-- SKIP LINK -->
    <a href="#view-layer" class="skip-link">Skip to content</a>

    <!-- NOSCRIPT -->
    <noscript>
        <div class="noscript-warning">
            This application requires JavaScript to render dynamic content. Please enable JavaScript in your browser
            settings.
        </div>
    </noscript>

    <!-- VISUAL OVERLAY -->
    <div class="fx-blur-shield" id="blur-shield" aria-hidden="true"></div>

    <!-- HEADER -->
    <header class="ui-masthead" role="banner">
        <div class="ui-brand">Veer Sentinel</div>

        <div class="ui-controls">
            <button class="ui-menu-trigger" id="menu-open" type="button" aria-label="Open navigation menu"
                aria-controls="nav-drawer" aria-expanded="false">
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </header>

    <!-- NAV DRAWER -->
    <nav class="ui-drawer" id="nav-drawer" role="navigation" aria-hidden="true">
        <div class="drawer-inner">
            <div class="drawer-header">
                <button class="ui-btn-close" id="menu-close" type="button" aria-label="Close navigation menu">
                    Dismiss ×
                </button>

                <button class="ui-btn-ghost" id="theme-switch" type="button" aria-label="Toggle theme">
                    Dark Mode
                </button>
            </div>

            <!-- PRIMARY NAVIGATION -->
            <div class="nav-stack">
                <!-- AppCore resolves these clean hashes to data/[lang]/[path] -->
                <a href="#home/index.json" class="nav-link" data-load="home/index.json">
                    <span>Home</span>
                </a>
                <a href="#home/aditya/index.json" class="nav-link" data-load="home/aditya/index.json">
                    <span>Aditya Profile</span>
                </a>
                <a href="#home/terrorism/index.json" class="nav-link" data-load="home/terrorism/index.json">
                    <span>Terrorism</span>
                </a>
                <a href="#home/cyber/index.json" class="nav-link" data-load="home/cyber/index.json">
                    <span>Digital Defense</span>
                </a>
            </div>

            <!-- PROFESSIONAL LANGUAGE SELECTOR -->
            <div class="nav-locale-section">
                <label for="lang-select" class="nav-label-sm">Language / भाषा / ગુજરાતી</label>
                <div class="select-wrapper">
                    <select id="lang-select" class="ui-lang-select" onchange="app.setLanguage(this.value)">
                        <option value="en">English</option>
                        <option value="hn">हिन्दी (Hindi)</option>
                        <option value="guj">ગુજરાતી (Gujarati)</option>
                    </select>
                    <span class="select-icon">▼</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN VIEWPORT -->
    <main class="ui-viewport" id="view-layer" role="main" tabindex="-1">
        <!-- Content from JSON files is mounted here -->
        <div id="content-mount" aria-live="polite"></div>
    </main>

    <!-- CORE SCRIPT -->
    <script src="src/js/script.js" defer></script>
</body>

</html>
